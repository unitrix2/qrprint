<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE QR Print</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        tr { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .drag-over { background-color: #dbeafe !important; border-color: #3b82f6 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white shadow-sm py-4 px-8 flex justify-between items-start sticky top-0 z-50">
        <div class="flex flex-col">
            <h1 class="text-2xl font-bold text-blue-600">N.C.<span class="text-slate-800">Railway</span></h1>
            <div class="mt-2 inline-flex items-center px-3 py-1 rounded-full text-[10px] uppercase tracking-wider font-bold bg-blue-100 text-blue-700 border border-blue-200 shadow-sm">
                <span class="mr-1.5 h-1.5 w-1.5 rounded-full bg-blue-500 animate-ping"></span>
                Created by: Salman
            </div>
        </div>
        <div class="space-x-4 mt-2">
            <button onclick="location.reload()" class="text-slate-500 hover:text-red-600 font-medium transition-colors">Reset</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-8 border border-slate-100">
            <label for="file-input" id="drop-zone" class="block border-2 border-dashed border-blue-200 rounded-xl p-10 text-center cursor-pointer hover:border-blue-400 bg-blue-50/30 transition-all">
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
                <div class="text-5xl mb-4">📂</div>
                <h2 class="text-xl font-semibold text-slate-700">Browse photos or Drag & Drop</h2>
                <p class="text-slate-500 mt-2">Click here to select multiple QR images</p>
                <p class="text-xs text-slate-400 mt-3 font-mono">Accepts: ABC_123-456 or ABC-123-456</p>
            </label>
        </div>

        <div id="actions" class="hidden flex gap-4 mb-6">
            <button id="export-excel" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-medium shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                📥 Export to Excel
            </button>
            <button id="export-csv" class="bg-slate-700 hover:bg-slate-800 text-white px-6 py-3 rounded-lg font-medium shadow-lg transition-transform active:scale-95 flex items-center gap-2">
                📄 Export to CSV
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800 text-white">
                        <tr>
                            <th class="p-4 uppercase text-xs font-bold tracking-wider">Sr No</th>
                            <th class="p-4 uppercase text-xs font-bold tracking-wider">CODE</th>
                            <th class="p-4 uppercase text-xs font-bold tracking-wider">FE_No</th>
                            <th class="p-4 uppercase text-xs font-bold tracking-wider">Depot</th>
                            <th class="p-4 uppercase text-xs font-bold tracking-wider">Caption</th>
                            <th class="p-4 uppercase text-xs font-bold tracking-wider">Link</th>
                        </tr>
                    </thead>
                    <tbody id="data-body" class="divide-y divide-slate-100 bg-white"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const dataBody = document.getElementById('data-body');
        const actionButtons = document.getElementById('actions');

        let tableData = [];

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) processFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFiles(e.target.files);
        });

        async function processFiles(files) {
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (!file.type.startsWith('image/')) continue;
                const qrData = await readQRCode(file);
                if (qrData) {
                    const processedRow = parseData(qrData, file.name, tableData.length + 1);
                    tableData.push(processedRow);
                    renderRow(processedRow);
                }
            }
            if (tableData.length > 0) actionButtons.classList.remove('hidden');
        }

        function readQRCode(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width; canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        try {
                            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            const code = jsQR(imageData.data, imageData.width, imageData.height);
                            resolve(code ? code.data : null);
                        } catch (err) { resolve(null); }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function parseData(link, fileName, index) {
            const code = link.includes('=') ? link.split('=').pop().substring(0, 6) : "N/A";
            let feNo = "N/A";
            const nameWithoutExt = fileName.split('.')[0];
            const match = nameWithoutExt.match(/(\d{3})[-](\d{3})$/);
            if (match) {
                feNo = `${match[1]}/${match[2]}`;
            } else if (nameWithoutExt.includes('_')) {
                const parts = nameWithoutExt.split('_');
                feNo = parts[parts.length - 1].replace('-', '/');
            }
            const depot = "CDO/CNB-";
            return { srNo: index, code, feNo, depot, caption: depot + feNo, link };
        }

        function renderRow(row) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors";
            tr.innerHTML = `
                <td class="p-4 text-slate-600 font-medium">${row.srNo}</td>
                <td class="p-4 font-mono text-blue-600 font-bold">${row.code}</td>
                <td class="p-4 text-slate-700 font-medium">${row.feNo}</td>
                <td class="p-4 text-slate-700">${row.depot}</td>
                <td class="p-4 font-bold text-slate-900">${row.caption}</td>
                <td class="p-4 text-xs text-slate-400 truncate max-w-xs" title="${row.link}">${row.link}</td>
            `;
            dataBody.appendChild(tr);
        }

        // Current Date Formatter Helper
        function getFormattedDate() {
            const today = new Date();
            const dd = String(today.getDate()).padStart(2, '0');
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const yyyy = today.getFullYear();
            return `${dd}-${mm}-${yyyy}`;
        }

        document.getElementById('export-excel').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(tableData.map(item => ({
                "Sr No": item.srNo, 
                "CODE": item.code, 
                "FE_No": item.feNo, 
                "Depot": item.depot, 
                "Caption": item.caption, 
                "Link": item.link
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "QR Data");
            
            // Set dynamic filename: FE_QR DD-MM-YYYY
            const fileName = `FE_QR ${getFormattedDate()}.xlsx`;
            XLSX.writeFile(wb, fileName);
        });

        document.getElementById('export-csv').addEventListener('click', () => {
            const ws = XLSX.utils.json_to_sheet(tableData);
            const csv = XLSX.utils.sheet_to_csv(ws);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            
            const fileName = `FE_QR ${getFormattedDate()}.csv`;
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
        });
    </script>
</body>
</html>
